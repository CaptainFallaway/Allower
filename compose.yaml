services:
    allower:
        image: allower:latest
        build:
            context: .
            dockerfile: Dockerfile
        container_name: allower
        ports:
            - 1024:1024 # Tihi
        networks:
            - demo-net
        environment:
            IPINFO_TOKEN: ${IPINFO_TOKEN:-}
            LOG_PRETTY: false
            LOG_LEVEL: "info"
            METRICS: 30s
        volumes:
            - ./test-data:/persist
    demo:
        image: nginxdemos/hello
        container_name: sse
        networks:
            - demo-net

networks:
    demo-net:
        driver: bridge
